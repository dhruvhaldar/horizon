<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizon: OR Workbench</title>
    <link rel="stylesheet" href="neumorph.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header class="panel">
            <h1>HORIZON</h1>
            <p>Applied Systems Engineering & Operations Research Simulator</p>
        </header>

        <div class="grid">
            <!-- Queueing Module -->
            <section class="panel" id="queueing-module">
                <h2>Queueing Networks</h2>
                <div class="input-group">
                    <label>External Arrivals ($\gamma$):</label>
                    <input type="text" id="q-gamma" class="inset" value="10, 5" placeholder="e.g., 10, 5">
                </div>
                <div class="input-group">
                    <label>Service Rates ($\mu$):</label>
                    <input type="text" id="q-mu" class="inset" value="20, 15" placeholder="e.g., 20, 15">
                </div>
                <div class="input-group">
                    <label>Routing Matrix ($P$):</label>
                    <textarea id="q-p" class="inset" rows="3" placeholder="Row-wise, e.g., 0, 0.5\n0, 0">0, 0.5&#10;0, 0</textarea>
                </div>
                <button class="btn" onclick="solveQueue()">Solve Network</button>
                <div class="results inset" id="queue-results">Results will appear here...</div>
                <div id="queue-graph" class="viz-container inset"></div>
            </section>

            <!-- Inventory Module -->
            <section class="panel" id="inventory-module">
                <h2>Inventory Optimization</h2>
                <div class="toggle-wrapper">
                    <span class="switch-label">EOQ</span>
                    <label class="switch">
                        <input type="checkbox" id="inv-toggle" class="togglesw" onchange="toggleInv()">
                        <div class="indicator left"></div>
                        <div class="indicator right"></div>
                        <div class="button-knob"></div>
                    </label>
                    <span class="switch-label" style="margin-left: 1rem;">(R, Q)</span>
                </div>

                <div id="inv-eoq-inputs">
                    <div class="input-group">
                        <label>Demand Rate:</label>
                        <input type="number" id="i-demand" class="inset" value="1000">
                    </div>
                    <div class="input-group">
                        <label>Ordering Cost:</label>
                        <input type="number" id="i-order" class="inset" value="50">
                    </div>
                    <div class="input-group">
                        <label>Holding Cost:</label>
                        <input type="number" id="i-hold" class="inset" value="2">
                    </div>
                    <button class="btn" onclick="solveEOQ()">Calculate EOQ</button>
                </div>

                <div id="inv-cont-inputs" style="display: none;">
                    <div class="input-group">
                        <label>Demand Rate:</label>
                        <input type="number" id="ic-demand" class="inset" value="1000">
                    </div>
                    <div class="input-group">
                        <label>Ordering Cost:</label>
                        <input type="number" id="ic-order" class="inset" value="50">
                    </div>
                    <div class="input-group">
                        <label>Holding Cost:</label>
                        <input type="number" id="ic-hold" class="inset" value="2">
                    </div>
                    <div class="input-group">
                        <label>Lead Time Mean:</label>
                        <input type="number" id="ic-lt-mean" class="inset" value="5">
                    </div>
                    <div class="input-group">
                        <label>Lead Time Std Dev:</label>
                        <input type="number" id="ic-lt-std" class="inset" value="1.2">
                    </div>
                    <button class="btn" onclick="solveContinuous()">Calculate (R, Q)</button>
                </div>

                <div class="results inset" id="inventory-results">Results will appear here...</div>
                <div class="viz-container inset">
                    <canvas id="inventory-chart"></canvas>
                </div>
            </section>

            <!-- Routing Module -->
            <section class="panel" id="routing-module">
                <h2>Route Planning (TSP)</h2>
                <div class="input-group">
                    <label>Nodes (comma separated):</label>
                    <input type="text" id="r-nodes" class="inset" value="A, B, C, D">
                </div>
                <div class="input-group">
                    <label>Edges (node1,node2,weight per line):</label>
                    <textarea id="r-edges" class="inset" rows="5">A,B,10&#10;A,C,15&#10;A,D,20&#10;B,C,35&#10;B,D,25&#10;C,D,30</textarea>
                </div>
                <button class="btn" onclick="solveTSP()">Optimize Route</button>
                <div class="results inset" id="routing-results">Results will appear here...</div>
                <div id="routing-graph" class="viz-container inset"></div>
            </section>
        </div>

        <footer>
            &copy; 2026 <a href="https://dhruvhaldar.vercel.app/" target="_blank" rel="noopener noreferrer">Dhruv Haldar</a>. MIT License. | <a href="https://github.com/dhruvhaldar/shannon" target="_blank" rel="noopener noreferrer" aria-label="GitHub repository (opens in a new tab)">GitHub</a>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
